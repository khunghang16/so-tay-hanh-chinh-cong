# nginx site config for the Sổ tay điện tử static flipbook.
# Mounted at /etc/nginx/conf.d/default.conf inside the nginx:alpine container.
# Serves /usr/share/nginx/html (the rsync'd static site).
#
# HTTP Range (206 Partial Content) is supported natively by nginx for static
# files — required for <video> playback/seek (especially Safari). No extra
# config needed; sendfile + static file handler emit Accept-Ranges + 206.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip for text assets (NOT for video/images — already compressed)
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Static page assets (flipbook page images, fonts) — cache long.
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # Video — explicit Accept-Ranges (nginx serves 206 by default for statics).
    location ~* \.mp4$ {
        add_header Accept-Ranges bytes;
        try_files $uri =404;
    }

    # HTML + the encrypted flipbook config/engine JS — never cache, so a deploy
    # is picked up immediately (config.js changes on every content update).
    location ~* \.(html|js)$ {
        expires -1;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
