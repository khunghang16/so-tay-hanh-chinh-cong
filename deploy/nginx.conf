# nginx site config for the Sổ tay điện tử static flipbook.
# Mounted at /etc/nginx/conf.d/default.conf inside the nginx:alpine container.
# Serves /usr/share/nginx/html (the rsync'd static site).
#
# HTTP Range (206 Partial Content) is supported natively by nginx for static
# files — required for <video> playback/seek (especially Safari). No extra
# config needed; sendfile + static file handler emit Accept-Ranges + 206.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip for text assets (NOT for video/images — already compressed)
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Ảnh trang flipbook + font. "no-cache" = trình duyệt LƯU nhưng LUÔN revalidate
    # (conditional GET): ảnh ĐỔI sau deploy -> etag mới -> 200 ảnh mới hiện NGAY; ảnh
    # chưa đổi -> 304 (nhẹ, không tải lại body). Cần vì ảnh do JS nạp động + URL dùng
    # version cố định nên cache thường giữ ảnh cũ rất lâu (hard-reload không bust được).
    # limit-pages.js còn gắn ?v=ASSET_VER để dứt điểm client đang kẹt cache 30d cũ.
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|woff2?|ttf|eot)$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Video — explicit Accept-Ranges (nginx serves 206 by default for statics).
    location ~* \.mp4$ {
        add_header Accept-Ranges bytes;
        try_files $uri =404;
    }

    # HTML + the encrypted flipbook config/engine JS — never cache, so a deploy
    # is picked up immediately (config.js changes on every content update).
    location ~* \.(html|js)$ {
        expires -1;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
